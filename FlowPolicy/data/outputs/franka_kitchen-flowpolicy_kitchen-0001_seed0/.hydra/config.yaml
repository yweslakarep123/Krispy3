task:
  name: franka_kitchen
  task_name: ${name}
  shape_meta:
    obs:
      point_cloud:
        shape:
        - 512
        - 3
        type: point_cloud
      agent_pos:
        shape:
        - 18
        type: low_dim
    action:
      shape:
      - 9
  env_runner:
    _target_: flow_policy_3d.env_runner.franka_kitchen_runner.FrankaKitchenRunner
    eval_episodes: 20
    max_steps: 280
    n_obs_steps: ${n_obs_steps}
    n_action_steps: ${n_action_steps}
    fps: 10
    device: ${training.device}
    use_point_crop: ${policy.use_point_crop}
    num_points: 512
    env_name: kitchen-complete-v0
  dataset:
    _target_: flow_policy_3d.dataset.franka_kitchen_dataset.FrankaKitchenDataset
    zarr_path: /home/dafa/Documents/FlowPolicy/data/franka_kitchen_expert.zarr
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    seed: 42
    val_ratio: 0.02
    max_train_episodes: null
name: train_flowpolicy_kitchen
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: franka_kitchen-flowpolicy_kitchen-0001
horizon: 8
n_obs_steps: 2
n_action_steps: 4
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: true
policy:
  _target_: flow_policy_3d.policy.flowpolicy.FlowPolicy
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  model_type: unet
  diffusion_step_embed_dim: 128
  down_dims:
  - 256
  - 512
  - 1024
  crop_shape:
  - 84
  - 84
  encoder_output_dim: 128
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}
  obs_as_global_cond: true
  shape_meta: ${shape_meta}
  dropout: 0.0
  use_pc_color: false
  pointnet_type: mlp
  Conditional_ConsistencyFM:
    eps: 0.01
    num_segments: 2
    boundary: 1
    delta: 0.05
    alpha: 0.0001
    num_inference_step: 1
  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false
ema:
  _target_: flow_policy_3d.model.flow.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999
dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: false
val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: false
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  weight_decay: 1.0e-06
training:
  device: cuda
  seed: 0
  debug: false
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 3000
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 200
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  max_grad_norm: 1.0
  ema_decay: 0.95
logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${exp_name}_${training.seed}
  project: flowpolicy_kitchen
  resume: true
  tags:
  - flowpolicy
  - franka_kitchen
checkpoint:
  save_ckpt: true
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 3
    format_str: epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt
  save_last_ckpt: true
  save_last_snapshot: false
multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
